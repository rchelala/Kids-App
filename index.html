<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Touch & Play" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <title>Touch & Play</title>
  <style>
    * {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      display: flex;
      flex-direction: column;
    }
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      touch-action: none;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: none;
    }
    #hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-family: -apple-system, sans-serif;
      font-size: 16px;
      letter-spacing: 2px;
      white-space: nowrap;
      pointer-events: none;
      transition: opacity 1.2s;
    }

    /* ── Toolbar ─────────────────────────────────────────── */
    #toolbar {
      flex-shrink: 0;
      height: calc(84px + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      background: rgba(10, 10, 10, 0.95);
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      gap: 6px;
      padding-left: 10px;
      padding-right: 10px;
      touch-action: pan-x;
    }
    #toolbar::-webkit-scrollbar { display: none; }

    .mode-btn {
      flex-shrink: 0;
      width: 68px;
      height: 68px;
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      cursor: pointer;
      transition: transform 0.12s, border-color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .mode-btn .icon { font-size: 28px; line-height: 1; }
    .mode-btn .label {
      font-family: -apple-system, sans-serif;
      font-size: 9px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .mode-btn.active {
      border-color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.14);
      transform: scale(1.06);
    }
    .mode-btn.active .label { color: rgba(255,255,255,0.9); }
    .mode-btn:active { transform: scale(0.93); }

    /* Gallery button has a subtle teal tint */
    #gallery-btn { border-color: rgba(100,220,255,0.3); }
    #gallery-btn.bg-active {
      border-color: rgba(100,220,255,0.9);
      background: rgba(100,220,255,0.18);
    }

    /* Divider between gallery button and mode buttons */
    .toolbar-divider {
      flex-shrink: 0;
      width: 1px;
      height: 44px;
      background: rgba(255,255,255,0.12);
      margin: 0 2px;
    }

    /* ── Gallery overlay ─────────────────────────────────── */
    #gallery-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.97);
      flex-direction: column;
      padding: env(safe-area-inset-top, 16px) 16px 16px;
    }
    #gallery-overlay.open { display: flex; }

    #gallery-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 14px;
      flex-shrink: 0;
    }
    #gallery-title {
      font-family: -apple-system, sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.3px;
    }
    #gallery-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }
    #gallery-grid {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding-bottom: env(safe-area-inset-bottom, 8px);
    }
    .gallery-item {
      aspect-ratio: 1;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      border: 3px solid transparent;
      transition: border-color 0.15s, transform 0.12s;
      touch-action: manipulation;
      position: relative;
      background: rgba(255,255,255,0.06);
    }
    .gallery-item:active { transform: scale(0.93); }
    .gallery-item.selected { border-color: #fff; }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    /* "No Background" tile */
    .gallery-none {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: rgba(255,255,255,0.07);
    }
    .gallery-none .none-icon { font-size: 30px; }
    .gallery-none .none-label {
      font-family: -apple-system, sans-serif;
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="hint">touch anywhere ✨</div>
</div>

<!-- Gallery picker overlay -->
<div id="gallery-overlay">
  <div id="gallery-header">
    <span id="gallery-title">🖼️ Choose a Background</span>
    <button id="gallery-close">✕</button>
  </div>
  <div id="gallery-grid">
    <div class="gallery-item gallery-none selected" data-src="">
      <span class="none-icon">🌑</span>
      <span class="none-label">None</span>
    </div>
    <!-- Image tiles injected by JS -->
  </div>
</div>

<div id="toolbar">
  <button class="mode-btn" id="gallery-btn" title="Gallery">
    <span class="icon">🖼️</span><span class="label">Gallery</span>
  </button>
  <div class="toolbar-divider"></div>
  <button class="mode-btn active" data-mode="sparkle">
    <span class="icon">✨</span><span class="label">Sparkles</span>
  </button>
  <button class="mode-btn" data-mode="star">
    <span class="icon">⭐</span><span class="label">Stars</span>
  </button>
  <button class="mode-btn" data-mode="heart">
    <span class="icon">❤️</span><span class="label">Hearts</span>
  </button>
  <button class="mode-btn" data-mode="bubble">
    <span class="icon">🫧</span><span class="label">Bubbles</span>
  </button>
  <button class="mode-btn" data-mode="balloon">
    <span class="icon">🎈</span><span class="label">Balloons</span>
  </button>
  <button class="mode-btn" data-mode="butterfly">
    <span class="icon">🦋</span><span class="label">Butterflies</span>
  </button>
  <button class="mode-btn" data-mode="flower">
    <span class="icon">🌸</span><span class="label">Flowers</span>
  </button>
  <button class="mode-btn" data-mode="dino">
    <span class="icon">🦕</span><span class="label">Dinos</span>
  </button>
</div>

<script>
  // ── Setup ──────────────────────────────────────────────────────────────────
  const wrap   = document.getElementById('canvas-wrap');
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  const hint   = document.getElementById('hint');
  const dpr    = Math.min(devicePixelRatio || 1, 2);

  let W, H;
  let items = [];
  const MAX_ITEMS = 250;
  let hintHidden = false;
  let currentMode = 'sparkle';
  const touchHues = new Map();
  let bgImageObj = null; // currently active background image

  function resize() {
    const r = wrap.getBoundingClientRect();
    W = canvas.width  = r.width  * dpr;
    H = canvas.height = r.height * dpr;
  }
  window.addEventListener('resize', resize);
  resize();

  // ── Gallery images list ────────────────────────────────────────────────────
  // Add filenames here to expand the gallery. Files go in the /Gallery/ folder.
  const GALLERY_FILES = [
    '2026-03-16 02_54_40-Documents and 1 more tab - File Explorer.png',
    '2026-03-16 02_55_20-Documents and 1 more tab - File Explorer.png',
    '2026-03-16 02_55_57-Documents and 1 more tab - File Explorer.png',
    '2026-03-16 02_56_30-Documents and 1 more tab - File Explorer.png',
    '2026-03-16 02_57_03-Documents and 1 more tab - File Explorer.png',
    '2026-03-16 02_57_44-Documents and 1 more tab - File Explorer.png',
    '2026-03-16 02_58_07-Documents and 1 more tab - File Explorer.png',
    '2026-03-16 02_58_38-Documents and 1 more tab - File Explorer.png',
    '2026-03-16 02_59_39-Documents and 1 more tab - File Explorer.png',
    '2026-03-16 03_00_00-Documents and 1 more tab - File Explorer.png',
    '2026-03-16 03_00_46-Documents and 1 more tab - File Explorer.png',
    '2026-03-16 03_01_08-Documents and 1 more tab - File Explorer.png',
    '2026-03-16 03_01_28-Documents and 1 more tab - File Explorer.png',
    '2026-03-16 03_02_19-Documents and 1 more tab - File Explorer.png',
  ];

  // Build gallery grid
  const galleryGrid = document.getElementById('gallery-grid');
  GALLERY_FILES.forEach(filename => {
    const src = 'Gallery/' + encodeURIComponent(filename);
    const item = document.createElement('div');
    item.className = 'gallery-item';
    item.dataset.src = src;
    const img = document.createElement('img');
    img.src = src;
    img.loading = 'lazy';
    item.appendChild(img);
    galleryGrid.appendChild(item);
  });

  // ── Gallery open/close/select ──────────────────────────────────────────────
  const galleryOverlay = document.getElementById('gallery-overlay');
  const galleryBtn     = document.getElementById('gallery-btn');

  document.getElementById('gallery-btn').addEventListener('click', () => {
    galleryOverlay.classList.add('open');
  });
  document.getElementById('gallery-close').addEventListener('click', () => {
    galleryOverlay.classList.remove('open');
  });

  galleryGrid.addEventListener('click', e => {
    const item = e.target.closest('.gallery-item');
    if (!item) return;
    galleryGrid.querySelectorAll('.gallery-item.selected').forEach(el => el.classList.remove('selected'));
    item.classList.add('selected');
    const src = item.dataset.src;
    setBackground(src);
    setTimeout(() => galleryOverlay.classList.remove('open'), 250);
  });

  function setBackground(src) {
    if (!src) {
      bgImageObj = null;
      wrap.style.backgroundImage = '';
      galleryBtn.classList.remove('bg-active');
    } else {
      bgImageObj = true; // flag: background is active
      wrap.style.backgroundImage = `url('${src}')`;
      galleryBtn.classList.add('bg-active');
    }
  }

  // ── Mode buttons ───────────────────────────────────────────────────────────
  document.querySelectorAll('.mode-btn[data-mode]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelector('.mode-btn.active').classList.remove('active');
      btn.classList.add('active');
      currentMode = btn.dataset.mode;
    });
  });

  // ── Helpers ────────────────────────────────────────────────────────────────
  const px = n => n * dpr;

  function getHue(id) {
    if (!touchHues.has(id)) touchHues.set(id, Math.random() * 360);
    return touchHues.get(id);
  }
  function shiftHue(id, amt = 2) {
    const h = (getHue(id) + amt) % 360;
    touchHues.set(id, h);
    return h;
  }

  function hideHint() {
    if (!hintHidden) {
      hintHidden = true;
      hint.style.opacity = '0';
      setTimeout(() => hint.remove(), 1400);
    }
  }

  // ── Item classes ───────────────────────────────────────────────────────────

  class Sparkle {
    constructor(x, y, hue) {
      this.x = x; this.y = y; this.hue = hue;
      this.size = px(Math.random() * 18 + 8);
      this.alpha = 1;
      this.decay = Math.random() * 0.018 + 0.008;
      this.vx = (Math.random() - 0.5) * px(4);
      this.vy = (Math.random() - 0.5) * px(4);
      this.gravity = px(0.12);
      this.sat   = Math.random() * 30 + 70;
      this.light = Math.random() * 20 + 50;
    }
    update() {
      this.x += this.vx; this.y += this.vy;
      this.vy += this.gravity;
      this.alpha -= this.decay;
      this.size  *= 0.985;
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.alpha);
      ctx.fillStyle = `hsl(${this.hue},${this.sat}%,${this.light}%)`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    get dead() { return this.alpha <= 0; }
  }

  class Ring {
    constructor(x, y, hue) {
      this.x = x; this.y = y; this.hue = hue;
      this.r = px(10);
      this.maxR = px(Math.random() * 140 + 80);
      this.alpha = 0.9;
      this.lw = px(Math.random() * 8 + 4);
    }
    update() {
      this.r += (this.maxR - this.r) * 0.08;
      this.alpha -= 0.012;
      this.lw *= 0.98;
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.alpha);
      ctx.strokeStyle = `hsl(${this.hue},100%,60%)`;
      ctx.lineWidth = this.lw;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
    get dead() { return this.alpha <= 0; }
  }

  // Pre-render emoji to offscreen canvas once — reuse via drawImage (GPU-accelerated)
  const emojiCache = {};
  function getEmojiImage(emoji) {
    if (emojiCache[emoji]) return emojiCache[emoji];
    const size = 128;
    const oc = document.createElement('canvas');
    oc.width = size; oc.height = size;
    const octx = oc.getContext('2d');
    octx.font = `${size * 0.8}px serif`;
    octx.textAlign = 'center';
    octx.textBaseline = 'middle';
    octx.fillText(emoji, size / 2, size / 2);
    emojiCache[emoji] = oc;
    return oc;
  }

  class EmojiItem {
    constructor(x, y, emoji, opts = {}) {
      this.x = x; this.y = y;
      this.img = getEmojiImage(emoji);
      this.size = px(opts.size ?? (Math.random() * 18 + 28));
      this.alpha = 1;
      this.decay = opts.decay ?? (Math.random() * 0.018 + 0.010);
      this.vx = (Math.random() - 0.5) * px(opts.spreadX ?? 3);
      this.vy = opts.vy ?? ((Math.random() - 0.5) * px(3));
      this.gravity  = px(opts.gravity  ?? 0.1);
      this.spin = (Math.random() - 0.5) * (opts.spin ?? 0.08);
      this.rotation = Math.random() * Math.PI * 2;
      this.scaleF = 1;
      this.scaleDecay = opts.scaleDecay ?? 0.993;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.vy += this.gravity;
      this.alpha -= this.decay;
      this.rotation += this.spin;
      this.scaleF *= this.scaleDecay;
    }
    draw() {
      const s = this.size * this.scaleF;
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.alpha);
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);
      ctx.drawImage(this.img, -s / 2, -s / 2, s, s);
      ctx.restore();
    }
    get dead() { return this.alpha <= 0; }
  }

  class Star {
    constructor(x, y, hue) {
      this.x = x; this.y = y; this.hue = hue;
      this.r = px(Math.random() * 16 + 10);
      this.alpha = 1;
      this.decay = Math.random() * 0.014 + 0.006;
      this.vx = (Math.random() - 0.5) * px(4);
      this.vy = (Math.random() - 0.5) * px(3) - px(1);
      this.gravity = px(0.09);
      this.spin = (Math.random() - 0.5) * 0.12;
      this.rotation = Math.random() * Math.PI * 2;
    }
    update() {
      this.x += this.vx; this.y += this.vy;
      this.vy += this.gravity;
      this.alpha -= this.decay;
      this.rotation += this.spin;
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.alpha);
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);
      ctx.fillStyle = `hsl(${this.hue},100%,65%)`;
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = (i * 4 * Math.PI) / 5 - Math.PI / 2;
        const b = a + (2 * Math.PI) / 10;
        if (i === 0) ctx.moveTo(Math.cos(a) * this.r, Math.sin(a) * this.r);
        else ctx.lineTo(Math.cos(a) * this.r, Math.sin(a) * this.r);
        ctx.lineTo(Math.cos(b) * this.r * 0.42, Math.sin(b) * this.r * 0.42);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
    get dead() { return this.alpha <= 0; }
  }

  class Heart {
    constructor(x, y, hue) {
      this.x = x; this.y = y; this.hue = hue;
      this.size = px(Math.random() * 14 + 10);
      this.alpha = 1;
      this.decay = Math.random() * 0.010 + 0.005;
      this.vx = (Math.random() - 0.5) * px(3);
      this.vy = -(Math.random() * px(2) + px(1));
      this.gravity = -px(0.03);
      this.wobble = 0;
      this.wobbleSpeed = Math.random() * 0.08 + 0.04;
    }
    update() {
      this.x += this.vx + Math.sin(this.wobble) * px(0.5);
      this.y += this.vy;
      this.vy += this.gravity;
      this.wobble += this.wobbleSpeed;
      this.alpha -= this.decay;
    }
    draw() {
      const s = this.size;
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.alpha);
      ctx.translate(this.x, this.y);
      ctx.fillStyle = `hsl(${this.hue},100%,65%)`;
      ctx.beginPath();
      ctx.moveTo(0, s * 0.3);
      ctx.bezierCurveTo( s * 0.9,  -s * 0.4,  s * 1.5,  s * 0.5,   0,  s * 1.3);
      ctx.bezierCurveTo(-s * 1.5,  s * 0.5, -s * 0.9, -s * 0.4,    0,  s * 0.3);
      ctx.fill();
      ctx.restore();
    }
    get dead() { return this.alpha <= 0; }
  }

  class Bubble {
    constructor(x, y, hue) {
      this.x = x; this.y = y; this.hue = hue;
      this.r = px(Math.random() * 20 + 12);
      this.targetR = this.r * (Math.random() * 1.5 + 1.5);
      this.alpha = 0.85;
      this.decay = Math.random() * 0.007 + 0.003;
      this.vx = (Math.random() - 0.5) * px(1.5);
      this.vy = -(Math.random() * px(2) + px(0.8));
      this.wobble = Math.random() * Math.PI * 2;
      this.wobbleSpeed = Math.random() * 0.05 + 0.02;
    }
    update() {
      this.r += (this.targetR - this.r) * 0.04;
      this.wobble += this.wobbleSpeed;
      this.x += this.vx + Math.sin(this.wobble) * px(0.8);
      this.y += this.vy;
      this.alpha -= this.decay;
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.alpha);
      const g = ctx.createRadialGradient(
        this.x - this.r * 0.3, this.y - this.r * 0.3, this.r * 0.05,
        this.x, this.y, this.r
      );
      g.addColorStop(0, 'rgba(255,255,255,0.55)');
      g.addColorStop(0.4, `hsla(${this.hue},80%,80%,0.25)`);
      g.addColorStop(1, `hsla(${this.hue},90%,65%,0.1)`);
      ctx.strokeStyle = `hsla(${this.hue},90%,75%,0.8)`;
      ctx.lineWidth = px(2.5);
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = g;
      ctx.fill();
      ctx.restore();
    }
    get dead() { return this.alpha <= 0; }
  }

  // Pre-warm emoji cache so first touch has no hitch
  ['🎈','🦋','🌸','🌺','🦕','🦖'].forEach(getEmojiImage);

  // ── Spawn functions ────────────────────────────────────────────────────────
  function spawn(cx, cy, hue, burst = false) {
    if (items.length >= MAX_ITEMS) return;
    const x = cx * dpr, y = cy * dpr;
    const count = burst ? 8 : (Math.floor(Math.random() * 2) + 2);

    switch (currentMode) {
      case 'sparkle':
        for (let i = 0; i < count; i++)
          items.push(new Sparkle(x, y, (hue + Math.random() * 40 - 20 + 360) % 360));
        if (burst) items.push(new Ring(x, y, hue));
        break;
      case 'star':
        for (let i = 0; i < count; i++)
          items.push(new Star(x, y, (hue + Math.random() * 60 - 30 + 360) % 360));
        break;
      case 'heart':
        for (let i = 0; i < count; i++)
          items.push(new Heart(x, y, (hue + Math.random() * 60 - 30 + 360) % 360));
        break;
      case 'bubble':
        for (let i = 0; i < (burst ? 5 : 2); i++)
          items.push(new Bubble(x, y, (hue + Math.random() * 60 - 30 + 360) % 360));
        break;
      case 'balloon':
        for (let i = 0; i < (burst ? 5 : 2); i++)
          items.push(new EmojiItem(x, y, '🎈', {
            vy: -(Math.random() * px(2) + px(1.5)),
            gravity: -px(0.02), spin: 0.03,
            size: Math.random() * 20 + 28, decay: 0.006,
          }));
        break;
      case 'butterfly':
        for (let i = 0; i < count; i++)
          items.push(new EmojiItem(x, y, '🦋', {
            vy: (Math.random() - 0.5) * px(3),
            gravity: 0, spreadX: 4, spin: 0.05,
            size: Math.random() * 16 + 24, decay: 0.007,
          }));
        break;
      case 'flower':
        for (let i = 0; i < count; i++)
          items.push(new EmojiItem(x, y, Math.random() < 0.5 ? '🌸' : '🌺', {
            vy: (Math.random() - 0.5) * px(2) - px(0.5),
            gravity: px(0.06), spin: 0.1,
            size: Math.random() * 16 + 24, decay: 0.008,
          }));
        break;
      case 'dino':
        for (let i = 0; i < (burst ? 5 : 2); i++)
          items.push(new EmojiItem(x, y, Math.random() < 0.5 ? '🦕' : '🦖', {
            vy: -(Math.random() * px(4) + px(2)),
            gravity: px(0.18), spreadX: 5, spin: 0.06,
            size: Math.random() * 20 + 32, decay: 0.009,
          }));
        break;
    }
  }

  // ── Render loop ────────────────────────────────────────────────────────────
  function drawBackground() {
    if (bgImageObj) {
      // CSS handles the background image — just clear the canvas each frame
      ctx.clearRect(0, 0, W, H);
    } else {
      // No background — dark fade creates particle trails
      ctx.save();
      ctx.globalAlpha = 0.12;
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }
  }

  function loop() {
    drawBackground();
    for (let i = items.length - 1; i >= 0; i--) {
      items[i].update();
      items[i].draw();
      if (items[i].dead) items.splice(i, 1);
    }
    requestAnimationFrame(loop);
  }
  loop();

  // ── Touch events ───────────────────────────────────────────────────────────
  const cw = document.getElementById('canvas-wrap');

  cw.addEventListener('touchstart', (e) => {
    e.preventDefault();
    hideHint();
    for (const t of e.changedTouches) {
      spawn(t.clientX, t.clientY, getHue(t.identifier), true);
    }
  }, { passive: false });

  cw.addEventListener('touchmove', (e) => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      spawn(t.clientX, t.clientY, shiftHue(t.identifier), false);
    }
  }, { passive: false });

  cw.addEventListener('touchend', (e) => {
    for (const t of e.changedTouches) touchHues.delete(t.identifier);
  }, { passive: false });

  // Mouse (desktop testing)
  let mouseDown = false, mouseHue = 0;
  cw.addEventListener('mousedown', (e) => {
    mouseDown = true; mouseHue = Math.random() * 360;
    spawn(e.clientX, e.clientY, mouseHue, true);
  });
  cw.addEventListener('mousemove', (e) => {
    if (!mouseDown) return;
    mouseHue = (mouseHue + 2) % 360;
    spawn(e.clientX, e.clientY, mouseHue, false);
  });
  cw.addEventListener('mouseup', () => { mouseDown = false; });

  window.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
