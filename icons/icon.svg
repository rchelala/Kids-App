    <stop offset="0%" stop-color="#b44fff" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#b44fff" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="g2" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ff4488" stop-opacity="0.85"/>
